<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Our Store</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <form id="form" class="login-box">
        
        <h2>Sign in</h2>
        <p class="tagline">Welcome to Our Store</p>

        <div class="field">
            <label for="username">Email</label>
            <input type="text" id="username" name="username" placeholder="Enter your email" autocomplete="email">
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password"
                autocomplete="current-password">
        </div>

        <label class="show-pass">
            <input type="checkbox" id="showpass" name="showpass">
            Show password
        </label>

        <span id="user-message"></span>
        <button type="submit" class="submit-btn">Sign in</button>
    </form>

    <script type="module" src="js/login.js"></script>
</body>
</html>
